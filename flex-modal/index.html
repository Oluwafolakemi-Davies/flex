<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Solution</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

    html, body {
      height: 100%;
    }

    body {
      font-family: Roboto, sans-serif;
      margin: 0;
      background: #aaa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The Main Modal Container */
    .modal {
      background: white;
      width: 480px;
      border-radius: 10px;
      box-shadow: 2px 4px 16px rgba(0,0,0,.2);
      
      display: flex;         /* Puts Icon and Content side-by-side */
      padding: 24px;         /* Padding around the edge */
      gap: 24px;             /* Equal space between icon and text */
    }

    /* The Left Icon */
    .icon {
      color: royalblue;
      font-size: 26px;
      font-weight: 700;
      background: lavender;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      
      flex-shrink: 0;        /* Prevents icon from squishing */
    }

    /* The Right Side Content Wrapper */
    .content {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Header Row (Title + Close Button) */
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .header {
      font-weight: 700;
      font-size: 20px;
    }

    .close-button {
      background: #eee;
      border-radius: 50%;
      color: #888;
      font-size: 16px;
      height: 24px;
      width: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #eee;
      padding: 0;
      cursor: pointer;
    }

    .text {
      line-height: 1.5;
    }

    /* Button Row */
    .button-container {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 700;
    }

    button.continue {
      background: royalblue;
      border: 1px solid royalblue;
      color: white;
    }

    button.cancel {
      background: white;
      border: 1px solid #ddd;
      color: royalblue;
    }
  </style>
</head>
<body>

  <div class="modal">
    <div class="icon">!</div>

    <div class="content">
      <div class="header-container">
        <div class="header">Are you sure you want to do that?</div>
        <button class="close-button">✖</button>
      </div>
      
      <div class="text">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Pariatur excepturi id soluta, numquam minima rerum doloremque eveniet aspernatur beatae commodi. Cupiditate recusandae ad repellendus quidem consectetur sequi amet aspernatur cumque!
      </div>

      <div class="button-container">
        <button class="continue">Continue</button>
        <button class="cancel">Cancel</button>
      </div>
    </div>
  </div>

</body>
</html>
